<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Formulaire 😎</title>

<style>
    body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #141e30, #243b55);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
    }

    .box {
        width: 400px;
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(10px);
        padding: 30px;
        border-radius: 20px;
        color: white;
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: rgba(255,255,255,0.25);
        color: white;
    }

    input::placeholder {
        color: #eee;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        border-radius: 30px;
        border: none;
        background: linear-gradient(45deg, #ff512f, #dd2476);
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
    }
</style>
</head>

<body>

<div class="box">
    <h2>RBE7 M3ANA 10000 DH</h2>
    <strong>by ibrahim beddouri</strong>

    <form action="result.html" method="get">
        <input type="text" placeholder="سميتك">
        <input type="text" placeholder="الكنية">
        <input type="text" placeholder="سمية ديال مك">
        <input type="text" placeholder="سمية ديال باك">
        <input type="text" placeholder="سمية ديال ختك">
        <input type="text" placeholder="RIB ديالك">
        

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
